task:
  title: "Digital Marketing Strategy Course — 8h Workshop Day Materials"
  description: |
    Create full-day (8h) course materials on Digital Marketing Strategy and Execution
    for postgraduate e-marketing students. Deliverables: Keynote presentation structure
    with slide-by-slide content and presenter notes, Canva Whiteboard exercise templates
    with facilitator guides. Covers: SOSTAC, RACE, Digital Strategy, Brand Strategy, CVP.
    Language: Polish. Format: lecture + workshop hybrid.
  status: in_progress
  tags: ["education", "digital-marketing", "course-design", "SOSTAC", "RACE", "Polish"]
  priority: high

