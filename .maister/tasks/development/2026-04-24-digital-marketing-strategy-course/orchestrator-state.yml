  research_reference:
    path: .maister/tasks/research/2026-04-24-digital-marketing-strategy-course
    research_question: |
      How to design and prepare a comprehensive 8-hour lecture-workshop day on Digital Marketing
      Strategy and Execution for postgraduate e-marketing students, covering SOSTAC, RACE,
      Digital Strategy, Brand Strategy, and Customer Value Proposition — with current market data,
      case studies, a Keynote presentation with presenter notes, and Canva Whiteboard exercises?
    research_type: mixed
    confidence_level: high
  phase_summaries:
    research:
      summary: |
        Comprehensive research complete. 5 research streams integrated: framework theory (SOSTAC/RACE/CVP/Brand Strategy),
        Polish & global market data (DataReportal 2025, Gemius/PBI), 5 international case studies (Nike, Spotify, IKEA,
        Duolingo, Zalando), 5 Polish case studies (Allegro, Żabka, InPost, CD Projekt Red, mBank), and course design
        best practices (Knowles andragogy, 70:20:10 model). 8-hour agenda, 4 workshop exercises, Keynote structure,
        and presenter notes guidance are all detailed in the report.
      key_findings:
        - "8-hour agenda: 09:00-17:00, 4 lecture blocks (~2h20m), 4 Canva workshops (~2h40m), breaks/lunch (~1h30m)"
        - "Framework hierarchy: Brand Strategy → Digital Strategy → Digital Marketing Strategy → SOSTAC → RACE"
        - "SOSTAC taught before Brand/CVP for pedagogical reasons (concrete before abstract)"
        - "All 4 exercises on single brand per group creates integrated learning artifact"
        - "Polish case studies: Allegro, Żabka, InPost, CD Projekt Red, mBank — all with detailed metrics"
        - "70:20:10 ratio: 70% active learning, 20% peer, 10% instruction (evidence-based)"
        - "Course is in Polish; research report in English"
      recommended_approach: |
        Create: (1) Keynote slide-by-slide structure with Polish content and presenter notes for each module,
        (2) 4 Canva Whiteboard exercise templates with facilitator guides (SOSTAC Audit, RACE Journey Map,
        Value Proposition Canvas, Budget/Channel Matrix), (3) supporting facilitator materials.
    codebase_analysis:
      key_files: []
      primary_language: "Markdown/content"
      summary: "No existing course materials in project. Starting from scratch using research report as foundation."
    clarifications: []
    gap_analysis:
